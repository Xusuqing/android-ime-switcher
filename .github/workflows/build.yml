name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 安装 Gradle 8.0
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: 生成 Gradle Wrapper
        run: gradle wrapper --gradle-version 8.0

      - name: 赋予 gradlew 执行权限
        run: chmod +x gradlew

      - name: 构建 Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: ImeSwitcher-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
